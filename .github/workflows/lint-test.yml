name: Lint and Test Charts

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'default/**'
      - 'default-hub/**'
      - 'sync_script.sh'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'default/**'
      - 'default-hub/**'
      - 'sync_script.sh'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Helm Lint
        run: |
          helm lint default/
          [ -d "default-hub" ] && helm lint default-hub/ || true

      - name: Helm Template
        run: |
          echo "Testing default chart"
          helm template test-release default/ --namespace test > /tmp/rendered-default.yaml
          if [ -d "default-hub" ]; then
            echo "Testing default-hub chart"
            helm template test-release default-hub/ --namespace test > /tmp/rendered-default-hub.yaml
          fi

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.8.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}

  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate sync script
        run: |
          chmod +x sync_script.sh
          bash -n sync_script.sh
          echo "Sync script syntax is valid"

      - name: Check tool versions
        run: |
          echo "Git version:"
          git --version
          echo "Kustomize version:"
          kustomize version
          echo "yq version:"
          yq --version
